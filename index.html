<!DOCTYPE html>
<html>
  <head>
    <title>CPR AR Trainer - Hand Compression Re-added</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        --accent: #00f2fe;
        --emergency-red: #ff4b2b;
        --success-green: #00ff88;
        --glass: rgba(255, 255, 255, 0.1);
      }

      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

      /* Screens (Landing & Finish) */
      .overlay-page {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--primary-gradient); z-index: 3000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; text-align: center; transition: 0.8s ease;
      }

      .glass-card {
        background: var(--glass); backdrop-filter: blur(20px);
        border-radius: 30px; padding: 40px; width: 85%; max-width: 450px;
        border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      }

      .btn-main {
        background: #fff; color: #1e3c72; padding: 15px 45px; border: none;
        border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        margin-top: 25px; transition: 0.3s;
      }

      /* AR Interface styles */
      #ar-ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1000; display: none; pointer-events: none;
      }

      .progress-container {
        position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
        width: 80%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px;
      }

      #progress-bar {
        width: 16.6%; height: 100%; background: var(--accent);
        border-radius: 10px; transition: 0.8s ease; box-shadow: 0 0 10px var(--accent);
      }

      .instruction-panel {
        position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 90%; pointer-events: auto; text-align: center;
      }

      .info-box {
        background: rgba(0, 0, 0, 0.8); color: white; padding: 25px;
        border-radius: 25px; border-left: 5px solid var(--accent); margin-bottom: 20px;
      }

      #step-num {
        display: block; font-weight: bold; color: var(--accent);
        letter-spacing: 2px; margin-bottom: 10px; font-size: 0.9rem;
      }

      #text-info { font-size: 1.15rem; line-height: 1.4; }

      .btn-next {
        width: 100%; padding: 18px; border-radius: 50px; border: none;
        color: white; font-weight: bold; background: var(--emergency-red);
        font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 75, 43, 0.4);
      }

      /* Counter */
      #cpr-counter {
        font-size: 5rem; color: #ffeb3b; font-weight: bold; display: none;
        text-shadow: 0 0 20px rgba(255,235,59,0.8); margin-bottom: 10px;
      }

      #finish-page { display: none; opacity: 0; }
    </style>
  </head>

  <body>

    <div id="landing-page" class="overlay-page">
      <div class="glass-card">
        <h1>CPR AR COACH</h1>
        <p style="opacity: 0.8; margin-bottom: 20px;">Animated Simulation Training</p>
        <button class="btn-main" onclick="initExperience()">START SESSION</button>
      </div>
    </div>

    <div id="finish-page" class="overlay-page">
      <div class="glass-card">
        <h1 style="color: var(--success-green);">WELL DONE!</h1>
        <p>You have completed the CPR training module successfully.</p>
        <button class="btn-main" onclick="location.reload()">RESTART SIMULATION</button>
      </div>
    </div>

    <div id="ar-ui">
      <div class="progress-container"><div id="progress-bar"></div></div>
      <div class="instruction-panel">
        <div id="cpr-counter">0</div>
        <div class="info-box">
          <small id="step-num">STEP 1 OF 6</small>
          <div id="text-info">Prepare for simulation...</div>
        </div>
        <button id="next-btn-text" class="btn-next" onclick="nextStep()">CONTINUE →</button>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-marker preset="hiro">
        
        <a-entity id="group1">
          <a-cone color="#00ff88" radius-bottom="0.1" height="0.3" position="0 0.5 0" rotation="180 0 0" animation="property: position; to: 0 0.7 0; dir: alternate; dur: 800; loop: true"></a-cone>
          <a-text value="SCENE SAFE" align="center" position="0 1 0" scale="0.8 0.8 0.8" color="#00ff88"></a-text>
        </a-entity>

        <a-entity id="group2" visible="false">
          <a-sphere color="#ffeb3b" radius="0.12" position="-0.4 0.3 -0.5" animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 400; loop: true"></a-sphere>
          <a-text value="CHECK RESPONSE" align="center" position="-0.4 0.7 -0.5" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group3" visible="false">
          <a-torus color="#00f2fe" radius="0.1" radius-tubular="0.01" position="0 0.3 -1" rotation="90 0 0"></a-torus>
          <a-text value="AIRWAY OPEN" align="center" position="0 0.6 -1" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group4" visible="false">
          <a-box color="#ff8800" position="0 0.1 -0.7" scale="0.2 0.2 0.2" animation="property: rotation; to: 0 360 0; dur: 3000; loop: true"></a-box>
          <a-text value="MONITOR BREATH" align="center" position="0 0.5 -0.7" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group5" visible="false">
          
          <a-entity id="hands_container" 
                    position="0 0.3 -0.5" 
                    animation="property: position; from: 0 0.3 -0.5; to: 0 0.05 -0.5; dur: 545; loop: true; dir: alternate; easing: linear">
              <a-box id="bottomHand" color="#ffdbac" width="0.15" height="0.03" depth="0.22" position="0 0 0"></a-box>
              <a-box id="topHand" color="#ffdbac" width="0.15" height="0.03" depth="0.22" position="0 0.03 0.02" rotation="10 0 0"></a-box>
              <a-cylinder id="arm" color="#ffdbac" radius="0.04" height="0.3" position="0 0.15 -0.1" rotation="45 0 0"></a-cylinder>
          </a-entity>

          <a-ring color="#ff0000" radius-inner="0.18" radius-outer="0.22" position="0 0.1 -0.5" rotation="-90 0 0"
                  animation="property: material.opacity; from: 1; to: 0.3; dir: alternate; dur: 545; loop: true"></a-ring>
          
          <a-text value="COMPRESS NOW" align="center" position="0 0.8 -0.5" scale="0.8 0.8 0.8" color="#ff0000" font="mozillavr"></a-text>
        </a-entity>

        <a-entity id="group6" visible="false">
          <a-sphere color="cyan" radius="0.15" position="0 0.3 -1" opacity="0.5" animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5; dur: 1000; loop: true; dir: alternate"></a-sphere>
          <a-text value="RESCUE BREATHS" align="center" position="0 0.8 -1" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      let currentStep = 1;
      let count = 0;
      let timer = null;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const stepsText = [
        "Check surroundings for any immediate danger to you or the victim.",
        "Check responsiveness: Shake shoulders and shout 'Are you okay?'.",
        "Perform head-tilt, chin-lift to clear the airway.",
        "Check breathing: Look, listen, and feel for normal breaths for 10s.",
        "Perform 30 chest compressions. Follow the rhythmic visual and audio cues.",
        "Deliver 2 rescue breaths to complete the cycle."
      ];

      function beep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
      }

      function initExperience() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('landing-page').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('landing-page').style.display = 'none';
          document.getElementById('ar-ui').style.display = 'block';
        }, 800);
      }

      function nextStep() {
        clearInterval(timer);
        document.getElementById('cpr-counter').style.display = 'none';

        if (currentStep < 6) {
          document.getElementById('group' + currentStep).setAttribute('visible', 'false');
          currentStep++;
          document.getElementById('group' + currentStep).setAttribute('visible', 'true');

          // Update UI Text & Progress
          document.getElementById('step-num').innerText = `STEP ${currentStep} OF 6`;
          document.getElementById('text-info').innerText = stepsText[currentStep - 1];
          document.getElementById('progress-bar').style.width = (currentStep * 16.6) + '%';
          
          if (currentStep === 6) {
            document.getElementById('next-btn-text').innerText = "FINISH SIMULATION ✓";
          }
          if (currentStep === 5) {
            startCPR();
          }
        } else {
          showFinishPage();
        }
      }

      function startCPR() {
        count = 0;
        document.getElementById('cpr-counter').style.display = 'block';
        document.getElementById('cpr-counter').innerText = count;
        
        // مزامنة الأنيميشن مع الصوت: نفس الـ interval
        timer = setInterval(() => {
          count++;
          if (count <= 30) {
            document.getElementById('cpr-counter').innerText = count;
            beep(900, 0.08); 
          } else {
            document.getElementById('cpr-counter').innerText = "DONE!";
            clearInterval(timer);
          }
        }, 545); // ~110 BPM
      }

      function showFinishPage() {
        document.getElementById('ar-ui').style.display = 'none';
        const fp = document.getElementById('finish-page');
        fp.style.display = 'flex';
        setTimeout(() => { fp.style.opacity = '1'; }, 100);
      }
    </script>
  </body>
</html>
